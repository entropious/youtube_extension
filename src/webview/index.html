<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta http-equiv="Content-Security-Policy" content="%%CSP%%">
	<style>
		%%STYLE%%
	</style>
</head>
<body>
	<div class="top-hitbox"></div>
	<div class="header">
		<div class="input-row">
			<button id="favorites-btn" title="Favorites">
				<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
			</button>
			<button id="history-btn" title="Recent History">
				<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
			</button>
			<button id="playlist-list-btn" title="Playlist Videos" style="display: none;">
				<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
			</button>
			<div class="input-container">
				<input type="text" id="url-input" placeholder="Paste YouTube URL here...">
				<button id="clear-btn" class="clear-btn" title="Clear">✕</button>
			</div>
			<button id="fav-current-btn" title="Add current to Favorites">
				<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
			</button>
			<button id="prev-btn" title="Previous (Playlist)">
				<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="19 20 9 12 19 4 19 20"></polygon><line x1="5" y1="19" x2="5" y2="5"></line></svg>
			</button>
			<button id="next-btn" title="Next (Playlist/Similar)">
				<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"></polygon><line x1="19" y1="5" x2="19" y2="19"></line></svg>
			</button>
			<button id="open-btn" title="Open in VS Code Tab">
				<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
			</button>
			<button id="close-list-btn" title="Close List" style="display: none;">
				<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
			</button>
		</div>
		<div class="settings-row">
			<div class="autoplay-group">
				<label class="checkbox-wrapper">
					<input type="checkbox" id="autoplay-check">
					Continuous Play (Similar)
				</label>
			</div>
			<div id="status-text">Ready</div>
		</div>
	</div>
	<div class="player-container">
		<div id="results-container" class="results-container"></div>
		<div id="empty-state" style="%%EMPTY_STATE_STYLE%%">
			<svg viewBox="0 0 24 24"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/></svg>
			<div class="empty-state-text">Paste a YouTube URL to start watching.</div>
			<div class="empty-state-input-container">
				<input type="text" id="empty-url-input" placeholder="YouTube URL or search query...">
				<button id="empty-url-btn">Go</button>
			</div>
			<span style="font-size:11px; margin-top:16px; opacity:0.6;">Tip: Use Continuous Play to keep the music going.</span>
		</div>
		<iframe id="video-frame" src="%%INITIAL_URL%%" referrerpolicy="strict-origin-when-cross-origin" allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share" allowfullscreen></iframe>
	</div>

	<script>
		%%SCRIPT%%
	</script>
</body>
</html>
